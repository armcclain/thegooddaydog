<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Good Day Dog | Happy Birthday Caroline!</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="icon" href="assets/images/favicon.ico">
</head>
<body>

    <div class="carousel-container">
        
        <button class="nav-btn left" id="prevBtn" aria-label="Previous Slide">&#10094;</button>
        <button class="nav-btn right" id="nextBtn" aria-label="Next Slide">&#10095;</button>

        <div class="carousel-track" id="track">
            
            <div class="slide" id="landing-slide">
                <div class="theater-container">
                    <video id="birthdayVideo" src="assets/videos/gddintro.mov" playsinline muted></video>
                    <div class="curtain left-curtain" id="leftCurtain"></div>
                    <div class="curtain right-curtain" id="rightCurtain"></div>
                    <button id="playBtn" class="play-trigger">PLAY</button>
                </div>
            </div>

            <div class="slide">
                <img src="assets/images/comic-panel-1.webp" alt="Comic Panel 1">
            </div>

            <div class="slide">
                <img src="assets/images/comic-panel-2.webp" alt="Comic Panel 2">
            </div>

        </div>
    </div>

    <script src="js/script.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Good Day Dog | Happy Birthday Caroline!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="carousel-container">
        <button class="nav-btn left" id="prevBtn" onclick="moveSlide(-1)" aria-label="Previous">&#10094;</button>
        <button class="nav-btn right" id="nextBtn" onclick="moveSlide(1)" aria-label="Next">&#10095;</button>

        <div class="carousel-track" id="track">
            
            <div class="slide">
                <div class="video-wrapper">
                    <video id="birthdayVideo" src="assets/videos/gddintro.mov" playsinline poster="assets/images/curtain-closed.png"></video>
                    <button id="playBtn" class="play-trigger" onclick="startBirthdayVideo()">
                        PLAY
                    </button>
                </div>
            </div>

            <div class="slide">
                <img src="assets/images/comic-panel-1.webp" alt="Comic Panel 1">
            </div>

            <div class="slide">
                <img src="assets/images/comic-panel-2.webp" alt="Comic Panel 2">
            </div>

        </div>
    </div>

    <script src="js/script.js" defer></script>
</body>
</html>
